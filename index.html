   - 尿白蛋白：UACR 尿蛋白 ${t.uacr} mg/g (微細血管受損滲漏中)
3. 飲食生活型態 (Dietary):

[I] Intervention (營養干預處方)
1. 蛋白質精準限量：限制全日蛋白质總量等同 ${a.proteinRatio}（等同每日總量為 ${a.proteinGrams}）。其中優質高生理價蛋白質（植物大豆、雞胸肉、雞蛋蛋白）比例必須拉高至 60% 以上。
